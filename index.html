<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transport Senior</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #1a1a1a;
            --primary-blue: #004a99;
            --accent-green: #28a745;
            --btn-height: 100px;
            --font-xl: 32px;
            --font-lg: 26px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.4;
            -webkit-tap-highlight-color: transparent;
        }

        .screen { display: none; flex-direction: column; gap: 20px; max-width: 600px; margin: 0 auto; }
        .active { display: flex; }

        h1 { font-size: 36px; text-align: center; margin-bottom: 20px; color: var(--primary-blue); }

        button {
            height: var(--btn-height);
            font-size: var(--font-xl);
            font-weight: 800;
            color: white;
            background-color: var(--primary-blue);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px #003366;
            transition: all 0.1s;
            padding: 10px;
        }

        button:active {
            box-shadow: 0 2px #003366;
            transform: translateY(4px);
        }

        .back-btn {
            background: none;
            color: var(--primary-blue);
            font-size: 80px;
            height: auto;
            width: auto;
            box-shadow: none;
            text-align: left;
            padding: 0;
            margin-bottom: -10px;
        }
        
        .back-btn:active { transform: none; box-shadow: none; }

        .time-input {
            font-size: 60px;
            height: 120px;
            text-align: center;
            border: 5px solid var(--primary-blue);
            border-radius: 20px;
            margin: 20px 0;
        }

        .result-container { display: flex; flex-direction: column; gap: 15px; }

        .result-card {
            background: white;
            border: 4px solid var(--primary-blue);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .result-card.closest { border-color: var(--accent-green); background-color: #e8f5e9; }
        .result-card .label { font-size: 18px; text-transform: uppercase; color: #666; display: block; }
        .result-card .time { font-size: 48px; font-weight: bold; color: var(--primary-blue); }
        .result-card .subtext { font-size: 20px; color: #444; }

        .confirm-btn { background-color: var(--accent-green); box-shadow: 0 6px #1e7e34; }
    </style>
</head>
<body>

    <div id="step1" class="screen active">
        <h1>Quel jour ?</h1>
        <button onclick="nextStep(2, {day: 'weekday'})">LUNDI À VENDREDI</button>
        <button onclick="nextStep(2, {day: 'saturday'})">SAMEDI</button>
    </div>

    <div id="step2" class="screen">
        <button class="back-btn" onclick="prevStep(1)">←</button>
        <h1>D'où partez-vous ?</h1>
        <button onclick="nextStep(3, {from: 'HOME'})">MAISON (Jean Jaurès)</button>
        <button onclick="nextStep(3, {from: 'BANK'})">BANQUE (République)</button>
        <button onclick="nextStep(3, {from: 'LEON BLUM'})">LEON BLUM (Bruxelles)</button>
        <button onclick="nextStep(3, {from: 'EARS'})">ORL (Foch)</button>
    </div>

    <div id="step3" class="screen">
        <button class="back-btn" onclick="prevStep(2)">←</button>
        <h1>Où allez-vous ?</h1>
        <div id="dest-options" style="display: flex; flex-direction: column; gap: 20px;"></div>
    </div>

    <div id="step4" class="screen">
        <button class="back-btn" onclick="prevStep(3)">←</button>
        <h1>Heure d'arrivée voulue ?</h1>
        <input type="time" id="targetTime" class="time-input" value="10:00" step="300" min="09:00" max="19:00">
        <button class="confirm-btn" onclick="processResults()">VOIR LES BUS</button>
    </div>

    <div id="step5" class="screen">
        <button class="back-btn" onclick="prevStep(4)">←</button>
        <h1>Options disponibles :</h1>
        <div id="results-list" class="result-container"></div>
        <button onclick="location.reload()" style="margin-top: 20px; background: #666; box-shadow: 0 6px #444;">RECOMMENCER</button>
    </div>

            },

                'BANK_HOME': ["09:00", "09:10", "09:20", "09:30", "09:40", "09:50", "10:00", "10:10", "10:20", "10:30", "10:40", "10:50", "11:00", "11:10", "11:20", "11:30", "11:40", "11:50", "12:00", "12:10", "12:20", "12:30", "12:40", "12:50", "13:00", "13:10", "13:20", "13:30", "13:40", "13:50", "14:00", "14:10", "14:20", "14:30", "14:40", "14:50", "15:00", "15:10", "15:20", "15:30", "15:40", "15:50", "16:00", "16:10", "16:20", "16:30", "16:40", "16:50", "17:00", "17:10", "17:20", "17:30", "17:40", "17:50", "18:00", "18:10", "18:20", "18:30", "18:40", "18:50"],
                'HOME_LEON BLUM': ["09:01", "09:11", "09:21", "09:31", "09:41", "09:51", "10:01", "10:11", "10:21", "10:31", "10:41", "10:51", "11:01", "11:11", "11:21", "11:31", "11:41", "11:51", "12:01", "12:11", "12:21", "12:31", "12:41", "12:51", "13:01", "13:11", "13:21", "13:31", "13:41", "13:51", "14:01", "14:11", "14:21", "14:31", "14:41", "14:51", "15:01", "15:11", "15:21", "15:31", "15:41", "15:51", "16:01", "16:11", "16:21", "16:31", "16:41", "16:51", "17:01", "17:11", "17:21", "17:31", "17:41", "17:51", "18:01", "18:11", "18:21", "18:31", "18:41", "18:51"],

        function nextStep(step, data) {
            Object.assign(selection, data);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');

            if (step === 3) {
                const container = document.getElementById('dest-options');
                container.innerHTML = '';
                if (selection.from === 'HOME') {
                    const destinations = ['BANK', 'LEON BLUM', 'EARS'];
                    const labels = {'BANK': 'BANQUE', 'LEON BLUM': 'LEON BLUM', 'EARS': 'ORL (Foch)'};
                    destinations.forEach(d => {
                        const b = document.createElement('button');
                        b.innerText = labels[d];
                        b.onclick = () => nextStep(4, {to: d});
                        container.appendChild(b);
                    });
                } else {
                    const b = document.createElement('button');
                    b.innerText = "RETOUR MAISON";
                    b.onclick = () => nextStep(4, {to: 'HOME'});
                    container.appendChild(b);
                }
            }
        }

        function prevStep(step) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }

        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function minutesToTime(totalMin) {
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            return `${h.toString().padStart(2, '0')}h${m.toString().padStart(2, '0')}`;
        }

        function processResults() {
            const targetStr = document.getElementById('targetTime').value;
            const targetMin = timeToMinutes(targetStr);
            const key = `${selection.from}_${selection.to}`;
            const schedules = busData[selection.day][key];
            const duration = durations[key];

            // Map schedules to arrival times
            let options = schedules.map(dep => {
                const depMin = timeToMinutes(dep);
                return { departure: dep, arrival: depMin + duration };
            });

            // Find closest index
            let closestIdx = 0;
            let minDiff = Infinity;
            options.forEach((opt, index) => {
                const diff = Math.abs(opt.arrival - targetMin);
                if (diff < minDiff) {
                    minDiff = diff;
                    closestIdx = index;
                }
            });

            // Get 3 options: before, closest, after
            const finalOptions = [];
            if (closestIdx > 0) finalOptions.push({ ...options[closestIdx - 1], type: 'Plus tôt' });
            finalOptions.push({ ...options[closestIdx], type: 'Idéal', highlight: true });
            if (closestIdx < options.length - 1) finalOptions.push({ ...options[closestIdx + 1], type: 'Plus tard' });

            displayResults(finalOptions);
            nextStep(5, {});
        }

        function displayResults(opts) {
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            opts.forEach(opt => {
                const card = document.createElement('div');
                card.className = `result-card ${opt.highlight ? 'closest' : ''}`;
                card.innerHTML = `
                    <span class="label">${opt.type}</span>
                    <div class="time">${opt.departure.replace(':', 'h')}</div>
                    <div class="subtext">Arrivée vers ${minutesToTime(opt.arrival)}</div>
                `;
                list.appendChild(card);
            });
        }

        // Register Service Worker for Offline access
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>

</html>
