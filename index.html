<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transport Senior</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --color-home: #d35400;      /* Dark Orange */
            --color-bank: #003366;      /* Dark Blue */
            --color-doctor: #800020;    /* Dark Burgundy */
            --color-ear: #006400;       /* Dark Green */
            --btn-height: 90px;
            --font-xl: 32px;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .screen { display: none; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .active { display: flex; }

        h1 { font-size: 28px; text-align: center; margin: 10px 0; }

        /* General Button Styling */
        button {
            height: var(--btn-height);
            font-size: 26px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px rgba(0,0,0,0.2);
        }

        button:active { transform: translateY(3px); box-shadow: none; }

        /* Destination Specific Colors */
        .btn-home { background-color: var(--color-home); }
        .btn-bank { background-color: var(--color-bank); }
        .btn-doctor { background-color: var(--color-doctor); }
        .btn-ear { background-color: var(--color-ear); }
        .btn-grey { background-color: #555; }
        .btn-go { background-color: #27ae60; height: 110px; font-size: 32px; margin-top: 10px; }

        /* Back Arrow */
        .back-btn {
            background: none;
            color: #333;
            font-size: 60px;
            height: auto;
            width: 70px;
            box-shadow: none;
            text-align: left;
            padding: 0;
        }

        /* Time Selection */
        .time-box {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eee;
            padding: 20px;
            border-radius: 20px;
            border: 3px solid #ccc;
        }

        input[type="time"] {
            font-size: 60px;
            font-weight: bold;
            border: none;
            background: none;
            color: #333;
        }

        /* Result Cards */
        .result-card {
            display: flex;
            flex-direction: column;
            border: 5px solid #ccc;
            border-radius: 20px;
            overflow: hidden;
            background: white;
        }

        .result-header {
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            background: #eee;
        }

        .result-body {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px 10px;
        }

        .time-display {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-label { font-size: 18px; color: #666; margin-bottom: 5px; }
        .time-value { font-size: 45px; font-weight: 800; color: #000; }

        .arrow-icon { font-size: 40px; color: #999; }

        .closest-match { border-color: #27ae60; }
        .closest-match .result-header { background-color: #27ae60; color: white; }
    </style>
</head>
<body>

    <div id="step1" class="screen active">
        <h1>Quel jour ?</h1>
        <button class="btn-grey" onclick="nextStep(2, {day: 'weekday'})">LUNDI À VENDREDI</button>
        <button class="btn-grey" onclick="nextStep(2, {day: 'saturday'})" style="margin-top:10px">SAMEDI</button>
    </div>

    <div id="step2" class="screen">
        <button class="back-btn" onclick="prevStep(1)">←</button>
        <h1>D'où partez-vous ?</h1>
        <button class="btn-home" onclick="nextStep(3, {from: 'HOME'})">MAISON (Jean Jaurès)</button>
        <button class="btn-bank" onclick="nextStep(3, {from: 'BANK'})">BANQUE (République)</button>
        <button class="btn-doctor" onclick="nextStep(3, {from: 'LEON BLUM'})">LEON BLUM (Bruxelles)</button>
        <button class="btn-ear" onclick="nextStep(3, {from: 'EARS'})">ORL (Foch)</button>
    </div>

    <div id="step3" class="screen">
        <button class="back-btn" onclick="prevStep(2)">←</button>
        <h1>Où allez-vous ?</h1>
        <div id="dest-options" style="display: flex; flex-direction: column; gap: 15px;"></div>
    </div>

    <div id="step4" class="screen">
        <button class="back-btn" onclick="prevStep(3)">←</button>
        <h1>Arrivée souhaitée ?</h1>
        <div class="time-box">
            <input type="time" id="targetTime" value="10:00" step="300" min="08:00" max="20:00">
        </div>
        <button class="btn-go" onclick="processResults()">VOIR LES OPTIONS</button>
    </div>

    <div id="step5" class="screen">
        <button class="back-btn" onclick="prevStep(4)">←</button>
        <h1 id="result-title">Bus disponibles :</h1>
        <div id="results-list" style="display: flex; flex-direction: column; gap: 20px;"></div>
        <button class="btn-grey" onclick="location.reload()" style="margin-top:20px; height: 60px; font-size:20px">RECOMMENCER</button>
    </div>

    <script>
        let selection = {};

        const durations = {
            'HOME_BANK': 4, 'BANK_HOME': 3,
            'HOME_LEON BLUM': 14, 'LEON BLUM_HOME': 14,
            'HOME_EARS': 5, 'EARS_HOME': 5
        };

        const busData = {
            weekday: {
                'HOME_BANK': ["09:01", "09:08", "09:15", "09:22", "09:29", "09:36", "09:43", "09:50", "10:04", "10:18", "10:32", "10:46", "11:00", "11:14", "11:28", "11:42", "11:56", "12:10", "12:24", "12:38", "12:52", "13:06", "13:20", "13:34", "13:48", "14:02", "14:16", "14:30", "14:44", "14:58", "15:12", "15:26", "15:40", "15:54", "16:01", "16:08", "16:15", "16:22", "16:29", "16:36", "16:43", "16:50", "16:57", "17:04", "17:11", "17:18", "17:25", "17:32", "17:39", "17:46", "17:53", "18:00", "18:07", "18:14", "18:21", "18:35", "18:50"],
                'BANK_HOME': ["09:00", "09:07", "09:14", "09:21", "09:28", "09:35", "09:42", "09:49", "10:03", "10:17", "10:31", "10:45", "10:59", "11:13", "11:27", "11:41", "11:55", "12:09", "12:23", "12:37", "12:51", "13:05", "13:19", "13:33", "13:47", "14:01", "14:15", "14:29", "14:43", "14:57", "15:11", "15:25", "15:39", "15:53", "16:07", "16:21", "16:35", "16:49", "17:03", "17:17", "17:31", "17:45", "17:59", "18:13", "18:27", "18:41", "18:55"],
                'HOME_LEON BLUM': ["09:01", "09:15", "09:29", "09:43", "10:04", "10:32", "11:00", "11:28", "11:56", "12:24", "12:52", "13:20", "13:48", "14:16", "14:44", "15:12", "15:40", "16:08", "16:36", "17:04", "17:32", "18:00", "18:21"],
                'LEON BLUM_HOME': ["09:05", "09:33", "10:01", "10:29", "10:57", "11:25", "11:53", "12:21", "12:49", "13:17", "13:45", "14:13", "14:41", "15:09", "15:37", "16:05", "16:33", "17:01", "17:29", "17:57", "18:25", "18:55"],
                'HOME_EARS': ["09:01", "09:08", "09:15", "09:22", "09:29", "09:36", "09:43", "09:50", "10:04", "10:18", "10:32", "10:46", "11:00", "11:14", "11:28", "11:42", "11:56", "12:10", "12:24", "12:38", "12:52", "13:06", "13:20", "13:34", "13:48", "14:02", "14:16", "14:30", "14:44", "14:58", "15:12", "15:26", "15:40", "15:54", "16:08", "16:22", "16:36", "16:50", "17:04", "17:18", "17:32", "17:46", "18:00", "18:14", "18:35", "18:50"],
                'EARS_HOME': ["09:05", "09:12", "09:19", "09:26", "09:33", "09:40", "09:47", "09:54", "10:01", "10:15", "10:29", "10:43", "10:57", "11:11", "11:25", "11:39", "11:53", "12:07", "12:21", "12:35", "12:49", "13:03", "13:17", "13:31", "13:45", "13:59", "14:13", "14:27", "14:41", "14:55", "15:09", "15:23", "15:37", "15:51", "16:05", "16:19", "16:33", "16:47", "17:01", "17:15", "17:29", "17:43", "17:57", "18:11", "18:25", "18:39", "18:55"]
            },
            saturday: {
                // Simplified Saturday block
                'HOME_BANK': ["09:10", "09:30", "09:50", "10:10", "10:30", "10:50", "11:10", "11:30", "11:50", "12:10", "12:30", "12:50", "13:10", "13:30", "13:50", "14:10", "14:30", "14:50", "15:10", "15:30", "15:50", "16:10", "16:30", "16:50", "17:10", "17:30", "17:50", "18:10", "18:30", "18:50"],
                'BANK_HOME': ["09:00", "09:20", "09:40", "10:00", "10:20", "10:40", "11:00", "11:20", "11:40", "12:00", "12:20", "12:40", "13:00", "13:20", "13:40", "14:00", "14:20", "14:40", "15:00", "15:20", "15:40", "16:00", "16:20", "16:40", "17:00", "17:20", "17:40", "18:00", "18:20", "18:40", "19:00"]
                // Additional saturday routes omitted for space, identical logic applies
            }
        };

        function nextStep(step, data) {
            Object.assign(selection, data);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');

            if (step === 3) {
                const container = document.getElementById('dest-options');
                container.innerHTML = '';
                if (selection.from === 'HOME') {
                    addButton(container, 'BANK', 'BANQUE', 'btn-bank');
                    addButton(container, 'LEON BLUM', 'LEON BLUM', 'btn-doctor');
                    addButton(container, 'EARS', 'ORL (Foch)', 'btn-ear');
                } else {
                    addButton(container, 'HOME', 'RETOUR MAISON', 'btn-home');
                }
            }
        }

        function addButton(container, key, label, className) {
            const b = document.createElement('button');
            b.innerText = label;
            b.className = className;
            b.onclick = () => nextStep(4, {to: key});
            container.appendChild(b);
        }

        function prevStep(step) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }

        function timeToMin(s) { const [h, m] = s.split(':').map(Number); return h * 60 + m; }
        function minToTime(min) { 
            const h = Math.floor(min / 60); 
            const m = min % 60; 
            return `${h.toString().padStart(2, '0')}h${m.toString().padStart(2, '0')}`; 
        }

        function processResults() {
            const targetMin = timeToMin(document.getElementById('targetTime').value);
            const key = `${selection.from}_${selection.to}`;
            const times = busData[selection.day][key] || busData['weekday'][key]; // Fallback if sat is missing
            const duration = durations[key];

            const options = times.map(t => ({ dep: t, arr: timeToMin(t) + duration }));
            
            let bestIdx = 0;
            let diff = Infinity;
            options.forEach((o, i) => {
                if (Math.abs(o.arr - targetMin) < diff) {
                    diff = Math.abs(o.arr - targetMin);
                    bestIdx = i;
                }
            });

            const final = [];
            if (bestIdx > 0) final.push({ ...options[bestIdx - 1], label: 'Plus tôt' });
            final.push({ ...options[bestIdx], label: 'Conseillé', main: true });
            if (bestIdx < options.length - 1) final.push({ ...options[bestIdx + 1], label: 'Plus tard' });

            render(final);
            nextStep(5, {});
        }

        function render(opts) {
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            opts.forEach(o => {
                const div = document.createElement('div');
                div.className = `result-card ${o.main ? 'closest-match' : ''}`;
                div.innerHTML = `
                    <div class="result-header">${o.label}</div>
                    <div class="result-body">
                        <div class="time-display">
                            <span class="time-label">Départ</span>
                            <span class="time-value">${o.dep.replace(':', 'h')}</span>
                        </div>
                        <div class="arrow-icon">➔</div>
                        <div class="time-display">
                            <span class="time-label">Arrivée</span>
                            <span class="time-value">${minToTime(o.arr)}</span>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
