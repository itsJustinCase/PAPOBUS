<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transport Senior</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --color-domitys: #d35400;
            --color-republique: #003366;
            --color-bruxelles: #800020;
            --color-foch: #006400;
            --color-weekday: #3498db;
            --color-saturday: #9b59b6;
            --btn-height: 125px;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .screen { display: none; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .active { display: flex; }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 10px;
        }

        h1 { 
            font-size: 32px; 
            margin: 0; 
            text-transform: uppercase; 
            flex-grow: 1;
            text-align: center;
            padding-right: 60px;
        }

        button {
            height: var(--btn-height);
            font-size: 35px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px rgba(0,0,0,0.2);
            text-transform: uppercase;
            line-height: 1.1;
            padding: 10px;
        }

        .sub-label {
            display: block;
            font-size: 32px; /* Increased from 20px to 32px */
            font-weight: normal;
            text-transform: none;
            margin-top: 4px;
        }

        button:active { transform: translateY(3px); box-shadow: none; }

        .btn-weekday { background-color: var(--color-weekday); height: 110px; }
        .btn-saturday { background-color: var(--color-saturday); height: 110px; }
        .btn-domitys { background-color: var(--color-domitys); }
        .btn-republique { background-color: var(--color-republique); }
        .btn-bruxelles { background-color: var(--color-bruxelles); }
        .btn-foch { background-color: var(--color-foch); }
        .btn-go { background-color: #27ae60; height: 110px; font-size: 35px; }
        .btn-restart { background-color: #555; height: 90px; font-size: 35px; margin-top: 20px; }

        .back-btn {
            background: none;
            color: #333;
            font-size: 60px;
            height: auto;
            width: 60px;
            box-shadow: none;
            padding: 0;
            text-transform: none;
        }

        .time-box {
            display: flex;
            justify-content: center;
            padding: 20px;
            border-radius: 20px;
            border: 4px solid #ccc;
        }

        input[type="time"] { font-size: 80px; font-weight: bold; border: none; background: none; }

        .result-card {
            display: flex;
            flex-direction: column;
            border: 5px solid #ccc;
            border-radius: 20px;
            overflow: hidden;
        }

        .result-header { padding: 10px; text-align: center; font-weight: bold; font-size: 24px; background: #eee; }
        .result-body { display: flex; justify-content: space-around; align-items: center; padding: 25px 10px; }
        .time-display { display: flex; flex-direction: column; align-items: center; }
        .time-label { font-size: 30px; font-weight: 900; color: #000; }
        .time-value { font-size: 55px; font-weight: 900; color: #000; }
        .closest-match { border-color: #27ae60; }
        .closest-match .result-header { background-color: #27ae60; color: white; }
    </style>
</head>
<body>

    <div id="step1" class="screen active">
        <div class="header-row"><h1>QUEL JOUR ?</h1></div>
        <button class="btn-weekday" onclick="nextStep(2, {day: 'weekday'})">LUNDI À VENDREDI</button>
        <button class="btn-saturday" onclick="nextStep(2, {day: 'saturday'})">SAMEDI</button>
    </div>

    <div id="step2" class="screen">
        <div class="header-row">
            <button class="back-btn" onclick="prevStep(1)">←</button>
            <h1>DEPART</h1>
        </div>
        <button class="btn-domitys" onclick="nextStep(3, {from: 'HOME'})">DOMITYS<span class="sub-label">(Jean Jaurès)</span></button>
        <button class="btn-republique" onclick="nextStep(3, {from: 'BANK'})">BANQUE<span class="sub-label">(République)</span></button>
        <button class="btn-bruxelles" onclick="nextStep(3, {from: 'LEON BLUM'})">LEON BLUM<span class="sub-label">(Bruxelles)</span></button>
        <button class="btn-foch" onclick="nextStep(3, {from: 'EARS'})">AMPLIFON<span class="sub-label">(Foch)</span></button>
    </div>

    <div id="step3" class="screen">
        <div class="header-row">
            <button class="back-btn" onclick="prevStep(2)">←</button>
            <h1>DESTINATION</h1>
        </div>
        <div id="dest-options" style="display: flex; flex-direction: column; gap: 15px;"></div>
    </div>

    <div id="step4" class="screen">
        <div class="header-row">
            <button class="back-btn" onclick="prevStep(3)">←</button>
            <h1 id="time-instruction">ARRIVÉE ?</h1>
        </div>
        <div class="time-box">
            <input type="time" id="targetTime" value="10:00">
        </div>
        <button class="btn-go" onclick="processResults()">VOIR LES OPTIONS</button>
    </div>

    <div id="step5" class="screen">
        <div class="header-row">
            <button class="back-btn" onclick="prevStep(4)">←</button>
            <h1>OPTIONS</h1>
        </div>
        <div id="results-list" style="display: flex; flex-direction: column; gap: 20px;"></div>
        <button class="btn-restart" onclick="location.reload()">RECOMMENCER</button>
    </div>

    <script>
        let selection = {};
        const durations = { 'HOME_BANK': 4, 'BANK_HOME': 3, 'HOME_LEON BLUM': 14, 'LEON BLUM_HOME': 14, 'HOME_EARS': 5, 'EARS_HOME': 5 };
        
        const busData = {
            weekday: {
                'HOME_BANK': ["09:01", "09:15", "09:29", "09:43", "10:04", "10:18", "10:32", "10:46", "11:00"],
                'BANK_HOME': ["09:00", "09:14", "09:28", "09:42", "10:03", "10:17", "10:31", "10:45", "11:06"],
                'HOME_LEON BLUM': ["09:01", "09:15", "09:29", "10:04", "10:32", "11:00"],
                'LEON BLUM_HOME': ["09:05", "09:19", "09:33", "10:01", "10:29", "10:57"],
                'HOME_EARS': ["09:01", "09:15", "09:29", "09:43", "10:04"],
                'EARS_HOME': ["09:05", "09:12", "09:19", "09:26", "09:33"]
            },
            saturday: {
                'HOME_BANK': ["09:10", "09:30", "09:50", "10:10", "10:30"],
                'BANK_HOME': ["09:00", "09:20", "09:40", "10:00", "10:20"]
            }
        };

        function nextStep(step, data) {
            Object.assign(selection, data);
            if (step === 3) {
                const container = document.getElementById('dest-options');
                container.innerHTML = '';
                if (selection.from === 'HOME') {
                    addDestBtn(container, 'BANK', 'BANQUE', '(République)', 'btn-republique');
                    addDestBtn(container, 'LEON BLUM', 'LEON BLUM', '(Bruxelles)', 'btn-bruxelles');
                    addDestBtn(container, 'EARS', 'AMPLIFON', '(Foch)', 'btn-foch');
                } else {
                    addDestBtn(container, 'HOME', 'DOMITYS', '(Jean Jaurès)', 'btn-domitys');
                }
            }
            if (step === 4) {
                document.getElementById('time-instruction').innerText = (selection.to === 'HOME') ? "DEPART ?" : "ARRIVÉE ?";
            }
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }

        function addDestBtn(container, key, label, sub, cls) {
            const b = document.createElement('button');
            b.className = cls;
            b.innerHTML = `${label}<span class="sub-label">${sub}</span>`;
            b.onclick = () => nextStep(4, {to: key});
            container.appendChild(b);
        }

        function prevStep(s) {
            document.querySelectorAll('.screen').forEach(sc => sc.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
        }

        function timeToMin(s) { const [h, m] = s.split(':').map(Number); return h * 60 + m; }
        function minToTime(min) { return `${Math.floor(min/60)}h${(min%60).toString().padStart(2,'0')}`; }

        function processResults() {
            const targetMin = timeToMin(document.getElementById('targetTime').value);
            const key = `${selection.from}_${selection.to}`;
            const times = busData[selection.day][key] || busData['weekday'][key] || [];
            const duration = durations[key] || 5;

            const options = times.map(t => ({ dep: t, depMin: timeToMin(t), arr: timeToMin(t) + duration }));
            let bestIdx = 0, diff = Infinity;
            
            options.forEach((o, i) => {
                const ref = (selection.to === 'HOME') ? o.depMin : o.arr;
                if (Math.abs(ref - targetMin) < diff) { diff = Math.abs(ref - targetMin); bestIdx = i; }
            });

            const final = [];
            if (bestIdx > 0) final.push({ ...options[bestIdx - 1], label: 'PLUS TÔT' });
            final.push({ ...options[bestIdx], label: 'CONSEILLÉ', main: true });
            if (bestIdx < options.length - 1) final.push({ ...options[bestIdx + 1], label: 'PLUS TARD' });

            const list = document.getElementById('results-list');
            list.innerHTML = '';
            final.forEach(o => {
                const div = document.createElement('div');
                div.className = `result-card ${o.main ? 'closest-match' : ''}`;
                div.innerHTML = `<div class="result-header">${o.label}</div><div class="result-body">
                    <div class="time-display"><span class="time-label">DÉPART</span><span class="time-value">${o.dep.replace(':','h')}</span></div>
                    <div style="font-size:40px">➔</div>
                    <div class="time-display"><span class="time-label">ARRIVÉE</span><span class="time-value">${minToTime(o.arr)}</span></div>
                </div>`;
                list.appendChild(div);
            });
            nextStep(5, {});
        }
    </script>
</body>
</html>
